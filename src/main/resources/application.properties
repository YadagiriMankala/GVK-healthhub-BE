# =====================================================
# GVK Health Hub Backend - Application Properties
# =====================================================

# Spring Application Name
spring.application.name=gvk-healthhub-be

# =====================================================
# Server Configuration
# =====================================================
server.port=${SERVER_PORT:8080}
server.servlet.context-path=/api/v1
server.compression.enabled=true
server.compression.mime-types=application/json,text/html,text/xml,text/plain
server.tomcat.max-connections=10000
server.tomcat.threads.max=200
server.tomcat.threads.min-spare=10
server.tomcat.accept-count=100
server.tomcat.connection-timeout=20000

# =====================================================
# MySQL Database Configuration
# =====================================================
spring.datasource.url=jdbc:mysql://localhost:3306/gvk_healthhub
spring.datasource.username=${DATABASE_USERNAME:root}
spring.datasource.password=${DATABASE_PASSWORD:root}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# HikariCP Connection Pool
spring.datasource.hikari.maximum-pool-size=20
spring.datasource.hikari.minimum-idle=5
spring.datasource.hikari.idle-timeout=300000
spring.datasource.hikari.connection-timeout=20000
spring.datasource.hikari.max-lifetime=1200000

# =====================================================
# JPA / Hibernate Configuration
# =====================================================
spring.jpa.database-platform=org.hibernate.dialect.MySQLDialect
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=${JPA_SHOW_SQL:false}
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.use_sql_comments=true
spring.jpa.properties.hibernate.jdbc.batch_size=50
spring.jpa.properties.hibernate.order_inserts=true
spring.jpa.properties.hibernate.order_updates=true
spring.jpa.properties.hibernate.query.fail_on_pagination_over_collection_fetch=false
spring.jpa.properties.hibernate.query.in_clause_parameter_padding=true

# =====================================================
# Flyway Migration Configuration
# =====================================================
spring.flyway.enabled=false
spring.flyway.locations=classpath:db/migration
spring.flyway.baseline-on-migrate=true
spring.flyway.validate-on-migrate=true

# =====================================================
# Jackson JSON Configuration
# =====================================================
spring.jackson.serialization.write-dates-as-timestamps=false
spring.jackson.deserialization.fail-on-unknown-properties=false
spring.jackson.default-property-inclusion=non_null
spring.jackson.date-format=yyyy-MM-dd'T'HH:mm:ss

# =====================================================
# Logging Configuration
# =====================================================
logging.level.root=${LOG_LEVEL_ROOT:INFO}
logging.level.com.gvk.healthhub=${LOG_LEVEL_APP:DEBUG}
logging.level.org.springframework.web=${LOG_LEVEL_WEB:INFO}
logging.level.org.hibernate=${LOG_LEVEL_HIBERNATE:WARN}
logging.level.org.flywaydb=${LOG_LEVEL_FLYWAY:INFO}
logging.pattern.console=%d{yyyy-MM-dd HH:mm:ss} [%thread] %-5level %logger{36} - %msg%n
logging.pattern.file=%d{yyyy-MM-dd HH:mm:ss} [%thread] %-5level %logger{36} - %msg%n
logging.file.name=${LOG_FILE_PATH:logs}/gvk-healthhub.log
logging.file.max-size=10MB
logging.file.max-history=30

# =====================================================
# Actuator Configuration
# =====================================================
management.endpoints.web.exposure.include=health,info,metrics
management.endpoint.health.show-details=always
management.endpoint.info.enabled=true
management.info.env.enabled=true

# =====================================================
# Application Info
# =====================================================
info.app.name=GVK Health Hub Backend API
info-app.description=Doctors Management API for GVK Health Hub
info.app.version=1.0.0-SNAPSHOT
info.environment=${SPRING_PROFILES_ACTIVE:dev}

# =====================================================
# API Configuration
# =====================================================
api.base-url=${API_BASE_URL:http://localhost:8080/api/v1}
api.rate-limit.enabled=true
api.rate-limit.requests-per-minute=100

# =====================================================
# Pagination Configuration
# =====================================================
pagination.default-page-size=10
pagination.max-page-size=100
pagination.default-sort-by=createdAt
pagination.default-sort-direction=DESC

# =====================================================
# Image Configuration
# =====================================================
image.base-url=${IMAGE_BASE_URL:https://www.gvkhealthhub.com/images}
image.max-size-mb=5
image.allowed-types=image/jpeg,image/png,image/webp